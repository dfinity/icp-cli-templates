# Template test configuration.
#
# templates.<name>.permutations — list of variable sets passed to `icp new`
#   as --define; an empty entry ({}) renders with the template defaults.
#   Each permutation gets a test run. The permutation id used for filtering
#   and reporting is the template name plus the values, e.g.
#   `hello-world:motoko:react`.
#
# templates.<name>.canisters — what to verify after deploy, per canister:
#   name — canister name as deployed; the literal {{project-name}} is
#          replaced with the rendered project's name.
#   curl — if true, curl the canister through the gateway
#          (http://<name>.local.localhost:8000/) and expect HTTP 200.
#   call — call `icp canister call <name> <method> '<args>'` and expect the
#          reply to contain `expect`.

templates:
  rust:
    permutations:
      - {}
    canisters:
      - name: backend
        call:
          method: greet
          args: '("ICP")'
          expect: 'Hello, ICP!'

  motoko:
    permutations:
      - {}
    canisters:
      - name: '{{project-name}}'
        call:
          method: greet
          args: '("ICP")'
          expect: 'Hello, ICP!'

  hello-world:
    permutations:
      - { backend_type: motoko, frontend_type: react }
      - { backend_type: motoko, frontend_type: vue }
      - { backend_type: rust, frontend_type: react }
      - { backend_type: rust, frontend_type: vue }
    canisters:
      - name: backend
        call:
          method: greet
          args: '("ICP")'
          expect: 'Hello, ICP!'
      - name: frontend
        curl: true
